# LOCAL profile: uses H2 in-memory database — no Docker needed!
# Run with: java -Dspring.profiles.active=local -jar target/metavault-1.0.0.jar

spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:metavaultdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop    # H2: recreate schema on every start
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

  # H2 web console at http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.hibernate.SQL: DEBUG
